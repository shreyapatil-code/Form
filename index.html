<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering College Admission Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1> Form for Admission in Engineering College </h1>
  <div class="main-container">

    <!-- Admission Form -->
    <div class="form-container">
      <img src="logo.jfif" alt="College Logo">
      <h2>Engineering College Admission Form</h2>
      <form id="admissionForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
          <option value="">--Select--</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="course">Select Engineering Branch:</label>
        <select id="course" name="course" required>
          <option value="">--Select Branch--</option>
          <option>Computer Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>IT</option>
        </select>

        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="3"></textarea>

        <button type="submit">Submit Application</button>
      </form>
    </div>

    <!-- Submitted Applications Table -->
    <div class="form-container">
      <h2>Submitted Applications</h2>
      <div class="table-wrapper">
        <table id="studentTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Branch</th>
              <th>Address</th>
            </tr>
          </thead>
          <tbody>
            <!-- New rows will be added here -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // JavaScript for adding form data to table
    document.getElementById("admissionForm").addEventListener("submit", function (event) {
      event.preventDefault(); // prevent page reload

      let name = document.getElementById("name").value;
      let dob = document.getElementById("dob").value;
      let gender = document.getElementById("gender").value;
      let email = document.getElementById("email").value;
      let phone = document.getElementById("phone").value;
      let branch = document.getElementById("course").value;
      let address = document.getElementById("address").value;

      let tableBody = document.querySelector("#studentTable tbody");
      let newRow = document.createElement("tr");

      newRow.innerHTML = `
        <td>${name}</td>
        <td>${dob}</td>
        <td>${gender}</td>
        <td>${email}</td>
        <td>${phone}</td>
        <td>${branch}</td>
        <td>${address}</td>
      `;

      tableBody.appendChild(newRow);

      document.getElementById("admissionForm").reset();
      alert("✅ Student added successfully!");
    });
  </script>

</body>
</html>
